name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build and package universal app bundle
        run: ./Scripts/package_app.sh --release --universal

      - name: Create tarball
        run: |
          # Include LICENSE so Homebrew sees multiple top-level entries and doesn't strip the .app
          mkdir -p pkg
          cp -r AgentPing.app pkg/
          cp LICENSE pkg/
          tar -czf AgentPing-${{ github.ref_name }}-macos.tar.gz -C pkg AgentPing.app LICENSE
          cp AgentPing.app/Contents/MacOS/agentping agentping-cli
          tar -czf agentping-cli-${{ github.ref_name }}-macos.tar.gz agentping-cli

      - name: Compute SHA256
        id: sha
        run: |
          echo "app_sha=$(shasum -a 256 AgentPing-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "cli_sha=$(shasum -a 256 agentping-cli-${{ github.ref_name }}-macos.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: |
            AgentPing-${{ github.ref_name }}-macos.tar.gz
            agentping-cli-${{ github.ref_name }}-macos.tar.gz
          body: |
            ## Install

            **Homebrew (recommended):**
            ```bash
            brew install ericermerimen/tap/agentping
            brew services start agentping
            ```

            **One-line install:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/ericermerimen/agentping/main/Scripts/install-remote.sh | bash
            ```

            **Manual download:**
            ```bash
            tar xzf AgentPing-${{ github.ref_name }}-macos.tar.gz
            mkdir -p ~/Applications
            cp -r AgentPing.app ~/Applications/
            open ~/Applications/AgentPing.app
            ```

            ## After install

            1. Grant **Accessibility** access when prompted (System Settings > Privacy & Security > Accessibility)
            2. Open AgentPing **Preferences** > click **"Copy Hook Config to Clipboard"**
            3. Paste into `~/.claude/settings.json`
            4. Restart your Claude Code sessions -- AgentPing will start tracking them

            ## SHA256 checksums
            - `AgentPing-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.app_sha }}`
            - `agentping-cli-${{ github.ref_name }}-macos.tar.gz`: `${{ steps.sha.outputs.cli_sha }}`

      - name: Update Sparkle appcast.xml
        if: "!contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          BUNDLE_VERSION=$(echo "$VERSION_NUM" | sed 's/-.*//')
          TAR_SIZE=$(stat -f%z "AgentPing-${VERSION}-macos.tar.gz" 2>/dev/null || stat --printf="%s" "AgentPing-${VERSION}-macos.tar.gz")
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          DOWNLOAD_URL="https://github.com/ericermerimen/agentping/releases/download/${VERSION}/AgentPing-${VERSION}-macos.tar.gz"

          # Write appcast to temp file first (we're on detached HEAD from the tag)
          cat > /tmp/appcast.xml << APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>AgentPing Updates</title>
              <link>https://ericermerimen.github.io/agentping/appcast.xml</link>
              <description>Most recent changes with links to updates.</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION_NUM}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:version="${BUNDLE_VERSION}"
                  sparkle:shortVersionString="${VERSION_NUM}"
                  length="${TAR_SIZE}"
                  type="application/octet-stream"
                />
              </item>
            </channel>
          </rss>
          APPCAST

          # Switch to main branch and commit the updated appcast
          git fetch origin main
          git checkout main
          cp /tmp/appcast.xml site/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          git commit -m "chore: update appcast.xml for ${VERSION}" || true
          git push origin main

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        if: env.TAP_TOKEN != '' && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc')
        run: |
          VERSION="${{ github.ref_name }}"
          SHA="${{ steps.sha.outputs.app_sha }}"
          URL="https://github.com/ericermerimen/agentping/releases/download/${VERSION}/AgentPing-${VERSION}-macos.tar.gz"

          # Clone the tap repo
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/ericermerimen/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          mkdir -p Formula

          # Generate updated formula
          cat > Formula/agentping.rb << FORMULA
          class Agentping < Formula
            desc "macOS menu bar app for monitoring Claude Code sessions"
            homepage "https://github.com/ericermerimen/agentping"
            url "${URL}"
            sha256 "${SHA}"

            depends_on :macos
            depends_on macos: :sonoma

            def install
              prefix.install "AgentPing.app"
              bin.install_symlink prefix/"AgentPing.app/Contents/MacOS/agentping"
            end

            def caveats
              <<~EOS
                To start AgentPing and auto-launch on login:

                  brew services start agentping

                After future upgrades:

                  brew upgrade agentping && brew services restart agentping

                Next steps:
                  1. Grant Accessibility access when prompted
                     (System Settings > Privacy & Security > Accessibility)
                  2. Open Preferences > "Copy Hook Config to Clipboard"
                  3. Paste into ~/.claude/settings.json
                  4. Restart your Claude Code sessions
              EOS
            end

            def post_install
              # Kill any running AgentPing so brew services restart picks up the new binary
              quiet_system "pkill", "-x", "AgentPingApp"
            end

            service do
              run [opt_prefix/"AgentPing.app/Contents/MacOS/AgentPingApp"]
              keep_alive true
              log_path var/"log/agentping.log"
              error_log_path var/"log/agentping-error.log"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentping.rb
          git commit -m "Update agentping to ${VERSION}" || true

          # Retry push with rebase to handle race conditions from other repos
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "==> Homebrew tap push succeeded (attempt $attempt)"
              break
            fi
            echo "==> Push failed (attempt $attempt), pulling with rebase..."
            git pull --rebase origin main || true
            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: Failed to push to homebrew-tap after 3 attempts"
              exit 1
            fi
          done
